<!DOCTYPE html>
<html>
<head>
    <title>Signup - DS AI</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
            display: flex;
            height: 100vh;
        }

        .left {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .left h1 {
            font-size: 36px;
            color: #38bdf8;
        }

        .right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #020617;
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .card h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            background: #0f172a;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border: none;
            border-radius: 8px;
            background: #38bdf8;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }

        .login {
            margin-top: 15px;
            text-align: center;
        }

        .login a {
            color: #38bdf8;
            text-decoration: none;
        }

    </style>
</head>

<body>

<div class="left">
    <h1>🚀 Join DS AI Solutions<br>Automation Platform</h1>
</div>

<div class="right">
    <div class="card">
        <h2>📝 Create Account</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Create Account</button>
    </form>

        <div class="login">
            <p>Already have an account?</p>
            <a href="/login">Login</a>
        </div>
    </div>
</div>

</body>
</html>
